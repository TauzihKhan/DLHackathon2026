<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | NOVA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-auth-page="login">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <section class="auth-shell">
      <div class="auth-card">
        <div class="brand-lockup">
          <p class="eyebrow brand-wordmark">NOVA</p>
          <p class="brand-tagline">Your AI Learning Hub</p>
        </div>
        <h1>Login</h1>
        <p class="muted auth-subtitle">Access your learning dashboard.</p>

        <form id="loginForm" class="auth-form">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" required placeholder="you@example.com" />

          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" required placeholder="Enter password" />

          <button class="primary-btn" type="submit">Login</button>
        </form>

        <p id="authMessage" class="status-msg"></p>
        <p class="switch-link">New user? <a href="register.html">Go to Register</a></p>
      </div>
    </section>

    <script src="auth.js"></script>
  </body>
</html>
