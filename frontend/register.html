<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Learner Intelligence</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-auth-page="register">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <section class="auth-shell">
      <div class="auth-card">
        <p class="eyebrow">Learner Portal</p>
        <h1>Register</h1>
        <p class="muted auth-subtitle">Create your account first.</p>

        <form id="registerForm" class="auth-form">
          <label for="registerName">Full Name</label>
          <input id="registerName" type="text" required placeholder="Your name" />

          <label for="registerEmail">Email</label>
          <input id="registerEmail" type="email" required placeholder="you@example.com" />

          <label for="registerDob">Date of Birth</label>
          <input id="registerDob" type="date" required />

          <label for="registerPassword">Create Password</label>
          <input id="registerPassword" type="password" minlength="6" required placeholder="At least 6 characters" />

          <button class="primary-btn" type="submit">Register</button>
        </form>

        <form id="verifyForm" class="auth-form hidden">
          <p class="verify-title">Email Verification</p>
          <p id="verifyHint" class="muted"></p>
          <p id="verifyMode" class="muted"></p>

          <label for="verificationCode">Enter verification code</label>
          <input id="verificationCode" type="text" inputmode="numeric" required placeholder="6-digit code" />

          <button class="primary-btn" type="submit">Verify Email</button>
        </form>

        <p id="authMessage" class="status-msg"></p>
        <p class="switch-link">Already registered? <a href="login.html">Go to Login</a></p>
      </div>
    </section>

    <script src="auth.js"></script>
  </body>
</html>
